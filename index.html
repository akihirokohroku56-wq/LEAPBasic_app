<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語 一問一答</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f2e6;
  --surface: #ffffff;
  --surface2: #fdf7ee;
  --border: #e4d8c4;
  --orange: #e8631a;
  --orange-light: #f08040;
  --orange-dim: #a03c08;
  --text: #1e1408;
  --text-dim: #6b5a40;
  --text-muted: #b8a888;
  --correct: #2a7a50;
  --correct-bg: #e8f5ee;
  --wrong: #c03020;
  --wrong-bg: #fce8e6;
  --accent: #d4530a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
/* Header */
.header {
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #ffffff;
  position: sticky; top: 0; z-index: 10;
  box-shadow: 0 1px 0 var(--border);
}
.header-title {
  font-family: 'Crimson Pro', serif;
  font-size: 1.25rem;
  color: var(--orange);
  letter-spacing: .08em;
}
.header-sub {
  font-size: .65rem;
  color: var(--text-muted);
  margin-top: 1px;
  letter-spacing: .12em;
  font-family: 'IBM Plex Mono', monospace;
}
.header-stats {
  font-size: .72rem;
  color: var(--text-dim);
  text-align: right;
  font-family: 'IBM Plex Mono', monospace;
}
.header-stats span { color: var(--orange); font-weight: 600; }
/* Layout */
.app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 51px); }
/* Sidebar */
.sidebar {
  width: 258px; min-width: 258px;
  background: var(--surface2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.filter-section { display: flex; flex-direction: column; gap: 8px; }
.filter-label {
  font-size: .6rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--orange-dim);
  font-weight: 700;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
}
/* Part buttons */
.part-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.part-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: .72rem;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: all .15s;
}
.part-btn:hover { border-color: var(--orange); color: var(--text); }
.part-btn.active {
  background: rgba(232,99,26,.12);
  border-color: var(--orange);
  color: var(--orange);
  font-weight: 600;
}
/* Range inputs */
.range-inputs { display: flex; align-items: center; gap: 6px; }
.range-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: .8rem;
  padding: 5px 8px;
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  outline: none;
  transition: border-color .15s;
  min-width: 0;
}
.range-input:focus { border-color: var(--orange-dim); }
.range-sep { color: var(--text-muted); font-size: .9rem; flex-shrink: 0; }
/* CEFR */
.cefr-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.cefr-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-size: .72rem;
  padding: 4px 9px;
  border-radius: 4px;
  cursor: pointer;
  transition: all .15s;
}
.cefr-btn:hover { border-color: var(--orange-dim); }
.cefr-btn.active {
  background: rgba(232,99,26,.12);
  border-color: var(--orange);
  color: var(--orange);
  font-weight: 600;
}
/* Mode */
.mode-btns { display: flex; gap: 4px; }
.mode-btn {
  flex: 1;
  padding: 6px;
  font-size: .7rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Noto Sans JP', sans-serif;
  text-align: center;
}
.mode-btn.active {
  background: rgba(232,99,26,.1);
  border-color: var(--orange);
  color: var(--orange);
}
/* Select all/clear */
.sel-btns { display: flex; gap: 4px; }
.small-btn {
  flex: 1;
  font-size: .62rem;
  padding: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 3px;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Noto Sans JP', sans-serif;
}
.small-btn:hover { border-color: var(--orange); color: var(--text); }
/* Start btn */
.start-btn {
  background: linear-gradient(135deg, var(--orange), var(--accent));
  border: none;
  color: #ffffff;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .88rem;
  letter-spacing: .08em;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all .2s;
  width: 100%;
  font-weight: 500;
}
.start-btn:hover { opacity: .85; transform: translateY(-1px); }
.q-count-preview {
  text-align: center;
  font-size: .68rem;
  color: var(--text-muted);
  margin-top: -10px;
  font-family: 'IBM Plex Mono', monospace;
}
.q-count-preview span { color: var(--orange); }
/* Main */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: hidden;
}
/* Start screen */
.start-screen {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.start-screen .big-icon { font-size: 3rem; margin-bottom: 4px; }
.start-screen h2 {
  font-family: 'Crimson Pro', serif;
  font-size: 1.5rem;
  color: var(--orange);
  letter-spacing: .05em;
}
.start-screen p {
  font-size: .82rem;
  color: var(--text-dim);
  max-width: 300px;
  line-height: 1.8;
}
/* Progress */
.progress-area { width: 100%; max-width: 680px; margin-bottom: 14px; }
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  font-size: .7rem;
  color: var(--text-dim);
  font-family: 'IBM Plex Mono', monospace;
}
.progress-info .pos { color: var(--text); font-weight: 500; }
.progress-bar-track {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange-dim), var(--orange));
  border-radius: 2px;
  transition: width .3s ease;
}
.score-mini { display: flex; gap: 14px; }
.score-o { color: var(--correct); font-family: 'IBM Plex Mono', monospace; }
.score-x { color: var(--wrong); font-family: 'IBM Plex Mono', monospace; }
/* Flashcard */
.card-scene {
  width: 100%;
  max-width: 680px;
  height: 270px;
  perspective: 1000px;
  cursor: pointer;
  margin-bottom: 18px;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .45s cubic-bezier(.4,0,.2,1);
}
.card-scene.flipped .card-inner { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(100,60,20,.08);
  padding: 26px 32px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.card-back {
  transform: rotateY(180deg);
  background: #fff9f0;
  border-color: var(--orange);
}
.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-tag {
  font-size: .6rem;
  letter-spacing: .1em;
  color: var(--text-muted);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
}
.card-cefr {
  font-size: .62rem;
  color: var(--orange-dim);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 500;
}
/* Question area */
.card-question-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 14px;
}
.card-instruction {
  font-size: .68rem;
  color: var(--text-muted);
  letter-spacing: .05em;
}
.card-sentence {
  font-family: 'Crimson Pro', serif;
  font-size: 1.22rem;
  line-height: 1.9;
  color: var(--text);
}
.card-sentence .ul {
  text-decoration: underline;
  text-underline-offset: 4px;
  text-decoration-color: var(--orange);
  color: var(--orange);
  font-weight: 600;
}
.card-hint-q {
  font-size: .65rem;
  color: var(--text-muted);
  text-align: right;
  letter-spacing: .06em;
}
/* Answer side */
.card-answer-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
}
.card-word {
  font-family: 'Crimson Pro', serif;
  font-size: 1.5rem;
  color: var(--orange);
  font-style: italic;
  letter-spacing: .03em;
}
.card-meaning-ja {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  line-height: 1.7;
}
.card-meaning-raw {
  font-size: .72rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.6;
  font-family: 'Noto Sans JP', sans-serif;
}
/* Answer buttons */
.answer-btns {
  display: flex;
  gap: 12px;
  width: 100%;
  max-width: 680px;
}
.ans-btn {
  flex: 1;
  padding: 13px;
  border-radius: 8px;
  border: 1px solid;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: .95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .04em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.ans-btn:disabled { opacity: .35; cursor: default; }
.ans-btn-o {
  background: var(--correct-bg);
  border-color: var(--correct);
  color: var(--correct);
}
.ans-btn-o:hover:not(:disabled) { background: var(--correct); color: #fff; }
.ans-btn-x {
  background: var(--wrong-bg);
  border-color: var(--wrong);
  color: var(--wrong);
}
.ans-btn-x:hover:not(:disabled) { background: var(--wrong); color: #fff; }
.ans-btn-skip {
  flex: .5;
  background: var(--surface2);
  border-color: var(--border);
  color: var(--text-muted);
  font-size: .78rem;
}
.ans-btn-skip:hover:not(:disabled) { border-color: var(--text-muted); color: var(--text); }
.flip-hint {
  font-size: .65rem;
  color: var(--text-muted);
  margin-top: -10px;
  letter-spacing: .06em;
  font-family: 'IBM Plex Mono', monospace;
}
.qcount-hint {
  font-size: .62rem;
  color: var(--text-muted);
  text-align: center;
  margin-top: 4px;
  font-family: 'IBM Plex Mono', monospace;
  min-height: 14px;
}
.qcount-hint.ok { color: var(--correct); }
/* Result */
.result-screen {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 480px;
}
.result-title {
  font-family: 'Crimson Pro', serif;
  font-size: 1.8rem;
  color: var(--orange);
  letter-spacing: .06em;
}
.result-score-circle {
  width: 140px; height: 140px;
  border-radius: 50%;
  border: 2px solid var(--orange);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--surface);
}
.result-pct {
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--orange);
  font-family: 'Crimson Pro', serif;
}
.result-pct-label {
  font-size: .62rem;
  color: var(--text-muted);
  letter-spacing: .12em;
  font-family: 'IBM Plex Mono', monospace;
}
.result-details { display: flex; gap: 32px; }
.result-detail { text-align: center; }
.result-detail .num {
  font-size: 1.8rem;
  font-weight: 700;
  font-family: 'Crimson Pro', serif;
}
.result-detail .lbl {
  font-size: .65rem;
  color: var(--text-muted);
  margin-top: 2px;
  font-family: 'IBM Plex Mono', monospace;
}
.result-detail.o .num { color: var(--correct); }
.result-detail.x .num { color: var(--wrong); }
.result-detail.skip .num { color: var(--text-dim); }
.result-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.result-btn {
  padding: 9px 22px;
  border-radius: 6px;
  font-size: .82rem;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: .04em;
}
.result-btn-primary {
  background: linear-gradient(135deg, var(--orange), var(--accent));
  border: none;
  color: #ffffff;
  font-weight: 600;
}
.result-btn-primary:hover { opacity: .85; }
.result-btn-secondary {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.result-btn-secondary:hover { border-color: var(--orange); color: var(--text); }
/* Wrong list */
.wrong-list {
  width: 100%;
  max-width: 480px;
  max-height: 160px;
  overflow-y: auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  text-align: left;
}
.wrong-list-title {
  font-size: .62rem;
  letter-spacing: .15em;
  color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
  margin-bottom: 8px;
}
.wrong-item {
  font-size: .78rem;
  color: var(--wrong);
  padding: 3px 0;
  font-family: 'Crimson Pro', serif;
  border-bottom: 1px solid var(--border);
}
.wrong-item:last-child { border-bottom: none; }
.wrong-item .wi-word { font-weight: 600; font-size: .88rem; }
.wrong-item .wi-m { color: var(--text-muted); font-size: .72rem; font-family: 'Noto Sans JP', sans-serif; }
@media (max-width: 620px) {
  .sidebar { width: 200px; min-width: 200px; }
  .card-scene { height: 230px; }
  .card-sentence { font-size: 1.05rem; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">英単語 一問一答</div>
    <div class="header-sub">LEAP Basic — 一問一答</div>
  </div>
  <div class="header-stats" id="headerStats">
    全 <span>1600</span> 問
  </div>
</div>

<div class="app">
  <div class="sidebar">

    <div class="filter-section">
      <div class="filter-label">Part</div>
      <div class="sel-btns">
        <button class="small-btn" onclick="selectAllParts()">全選択</button>
        <button class="small-btn" onclick="clearParts()">クリア</button>
      </div>
      <div class="part-grid" id="partGrid"></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">番号範囲</div>
      <div class="range-inputs">
        <input type="number" class="range-input" id="numMin" placeholder="1" min="1" max="1600" value="">
        <span class="range-sep">〜</span>
        <input type="number" class="range-input" id="numMax" placeholder="1600" min="1" max="1600" value="">
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">CEFRレベル</div>
      <div class="cefr-grid" id="cefrGrid"></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">出題モード</div>
      <div class="mode-btns">
        <button class="mode-btn active" id="modeSeq" onclick="setMode('seq')">順番通り</button>
        <button class="mode-btn" id="modeShuffle" onclick="setMode('shuffle')">ランダム</button>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">出題数</div>
      <div class="range-inputs">
        <input type="number" class="range-input" id="qCount" placeholder="全問" min="1" style="width:100%;text-align:center;">
      </div>
      <div class="qcount-hint" id="qCountHint"></div>
    </div>

    <div class="filter-section">
      <button class="start-btn" onclick="startQuiz()">▶ 出題開始</button>
      <div class="q-count-preview" id="qCountPreview">対象: <span id="qCountSpan">0</span> 問</div>
    </div>

  </div><!-- /sidebar -->

  <div class="main" id="mainArea">
    <div class="start-screen" id="startScreen">
      <div class="big-icon">🚀</div>
      <h2>英単語 一問一答</h2>
      <p>用例の下線部の日本語訳を答えてください。<br>Part・番号範囲・CEFRレベルでフィルタリングできます。</p>
    </div>

    <div id="quizArea" style="display:none; width:100%; max-width:680px; display:none; flex-direction:column; align-items:center; gap:0;">

      <div class="progress-area">
        <div class="progress-info">
          <span class="pos" id="progPos">1 / 20</span>
          <div class="score-mini">
            <span class="score-o" id="scoreO">○ 0</span>
            <span class="score-x" id="scoreX">× 0</span>
          </div>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
        </div>
      </div>

      <div class="card-scene" id="cardScene" onclick="flipCard()">
        <div class="card-inner" id="cardInner">
          <!-- Front -->
          <div class="card-face" id="cardFront">
            <div class="card-meta">
              <span class="card-tag" id="cardTag">Part1</span>
              <span class="card-cefr" id="cardCefr">A1</span>
            </div>
            <div class="card-question-area">
              <div class="card-instruction">下線部を日本語に訳しなさい。</div>
              <div class="card-sentence" id="cardSentence"></div>
            </div>
            <div class="card-hint-q">クリックで答えを確認 ▶</div>
          </div>
          <!-- Back -->
          <div class="card-face card-back" id="cardBack">
            <div class="card-meta">
              <span class="card-word" id="cardWord"></span>
              <span class="card-tag" id="cardTagB"></span>
            </div>
            <div class="card-answer-area">
              <div class="card-meaning-ja" id="cardMeaningJa"></div>
              <div class="card-meaning-raw" id="cardMeaningRaw"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="flip-hint" id="flipHint">カードをクリックして答えを確認 — その後 ○/× を押してください</div>

      <div class="answer-btns" style="margin-top:14px;">
        <button class="ans-btn ans-btn-x" id="btnX" onclick="answer(false)" disabled>✕ 不正解</button>
        <button class="ans-btn ans-btn-skip" id="btnSkip" onclick="answer(null)" disabled>— スキップ</button>
        <button class="ans-btn ans-btn-o" id="btnO" onclick="answer(true)" disabled>○ 正解</button>
      </div>

    </div>

    <div id="resultArea" style="display:none; width:100%; flex-direction:column; align-items:center; gap:20px;">
      <div class="result-screen">
        <div class="result-title">結果</div>
        <div class="result-score-circle">
          <div class="result-pct" id="resPct">0%</div>
          <div class="result-pct-label">SCORE</div>
        </div>
        <div class="result-details">
          <div class="result-detail o"><div class="num" id="resO">0</div><div class="lbl">○ 正解</div></div>
          <div class="result-detail x"><div class="num" id="resX">0</div><div class="lbl">✕ 不正解</div></div>
          <div class="result-detail skip"><div class="num" id="resSkip">0</div><div class="lbl">— スキップ</div></div>
        </div>
        <div class="result-btns">
          <button class="result-btn result-btn-primary" onclick="retryWrong()">✕をもう一度</button>
          <button class="result-btn result-btn-secondary" onclick="startQuiz()">もう一度（同条件）</button>
          <button class="result-btn result-btn-secondary" onclick="resetToStart()">設定に戻る</button>
        </div>
      </div>
      <div class="wrong-list" id="wrongList" style="display:none;">
        <div class="wrong-list-title">INCORRECT ANSWERS</div>
        <div id="wrongItems"></div>
      </div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<script>
// Format: [sheet, group, num, word, cefr, meaning, ex_en, ex_ja]

// ── Question pool ───────────────────────────────────────────────
// DB format: [sheet, group, num, word, cefr, meaning, ex_en, ex_ja]
// qobj format: { entry, ex_en_s, ex_ja_s, mc_s }
let QUESTION_POOL = [];

function expandEntry(entry) {
  const ex_en = entry[6], ex_ja = entry[7];
  const mc = entry[5].replace(/^\[.+?\]\s*/, "").trim();
  const hasC = [...CIRCLES].some(ch => ex_en.includes(ch));
  if (!hasC) {
    const e = ex_en.trim().split("\n")[0].replace(/\s*◇.*$/, "").trim();
    const j = (ex_ja || "").trim().split("\n")[0].replace(/\s*◇.*$/, "").trim();
    return e ? [{ entry, ex_en_s: e, ex_ja_s: j, mc_s: mc }] : [];
  }
  const re = new RegExp("[" + CIRCLES + "]");
  const pe = ex_en.split(re).map(s => s.trim()).filter(Boolean);
  const pm = mc.split(re).map(s => s.trim()).filter(Boolean);
  const pj = (ex_ja || "").split(re).map(s => s.trim()).filter(Boolean);
  return pe.map((ex, i) => {
    const e = ex.split("\n")[0].replace(/\s*◇.*$/, "").trim();
    const j = (pj[i] || pj[0] || "").split("\n")[0].replace(/\s*◇.*$/, "").trim();
    return e ? { entry, ex_en_s: e, ex_ja_s: j, mc_s: pm[i] || pm[0] || "" } : null;
  }).filter(Boolean);
}

function buildPool() {
  QUESTION_POOL = [];
  DB.forEach(function(entry) {
    expandEntry(entry).forEach(function(qobj) { QUESTION_POOL.push(qobj); });
  });
}

function togglePart(p, btn) {
  if (activeParts.has(p)) { activeParts.delete(p); btn.classList.remove("active"); }
  else { activeParts.add(p); btn.classList.add("active"); }
  updateCount();
}
function selectAllParts() {
  ["Part1","Part2","Part3","Part4","Part5"].forEach(function(p) {
    activeParts.add(p);
    document.getElementById("pb-" + p).classList.add("active");
  });
  updateCount();
}
function clearParts() {
  activeParts.clear();
  ["Part1","Part2","Part3","Part4","Part5"].forEach(function(p) {
    document.getElementById("pb-" + p).classList.remove("active");
  });
  updateCount();
}
function toggleCefr(lv, btn) {
  if (activeCefr.has(lv)) { activeCefr.delete(lv); btn.classList.remove("active"); }
  else { activeCefr.add(lv); btn.classList.add("active"); }
  updateCount();
}
function setMode(m) {
  mode = m;
  document.getElementById("modeSeq").classList.toggle("active", m === "seq");
  document.getElementById("modeShuffle").classList.toggle("active", m === "shuffle");
}

function getFilteredPool() {
  const mn = parseInt(document.getElementById("numMin").value) || 1;
  const mx = parseInt(document.getElementById("numMax").value) || 9999;
  return QUESTION_POOL.filter(function(qobj) {
    const e = qobj.entry;
    if (!activeParts.has(e[0])) return false;
    if (e[2] < mn || e[2] > mx) return false;
    if (activeCefr.size > 0 && !activeCefr.has(e[4])) return false;
    return true;
  });
}

function updateCount() {
  const pool  = getFilteredPool();
  const total = pool.length;
  document.getElementById("qCountSpan").textContent = total;
  const qv   = parseInt(document.getElementById("qCount").value);
  const hint = document.getElementById("qCountHint");
  if (qv > 0) {
    if (qv >= total) {
      hint.textContent  = "（対象全 " + total + " 問を出題）";
      hint.className    = "qcount-hint";
    } else {
      hint.textContent  = "→ " + total + " 問中 " + qv + " 問をランダム抽出";
      hint.className    = "qcount-hint ok";
    }
  } else {
    hint.textContent = "未入力 = 対象の全問を出題";
    hint.className   = "qcount-hint";
  }
}

// ── Question helpers ────────────────────────────────────────────
function cleanAns(raw) {
  let t = (raw || "").trim();
  t = t.replace(/〈.+?〉/g, "");
  t = t.replace(/（＊[^）]*）/g, "").trim();
  t = t.replace(/^～/, "").trim().replace(/^の/, "").trim();
  while (/^（[^）]*[～〜A-Za-z][^）]*）/.test(t)) t = t.replace(/^（[^）]*）\s*/, "").trim();
  while (/^\([^)]*[～〜A-Za-z][^)]*\)/.test(t))  t = t.replace(/^\([^)]*\)\s*/, "").trim();
  t = t.split("　")[0].trim();
  let depth = 0, buf = "";
  for (let i = 0; i < t.length; i++) {
    const ch = t[i];
    if ("（(".indexOf(ch) >= 0) depth++;
    else if ("）)".indexOf(ch) >= 0) depth--;
    else if ("，,".indexOf(ch) >= 0 && depth === 0) break;
    buf += ch;
  }
  return buf.trim().replace(/^[～〜の]/, "").trim();
}

function findUL(base, sentence) {
  if (!sentence || /^[―\-—]+$/.test(sentence.trim())) return ["", sentence || "", ""];
  base = base.replace(/[,.!?×\[\]]/g, "").trim();
  if (!base) return ["", sentence, ""];

  let clean = stripAccents(sentence);
  clean = clean.replace(/（[^）]*）/g, " ").replace(/\[[^\]]*\]/g, " ");
  clean = clean.replace(/[×＊]\w+/g, " ");

  function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
  function hit(pattern, src){
    const m = src.match(new RegExp("\\b" + pattern + "\\b", "i"));
    if (!m) return null;
    // 元の sentence から同位置の文字列を返す
    const ci = sentence.search(new RegExp("\\b" + pattern + "\\b", "i"));
    if (ci < 0) return null;
    const matched = sentence.slice(ci, ci + m[0].length);
    return [sentence.slice(0, ci), matched, sentence.slice(ci + m[0].length)];
  }

  const e = esc(base);
  let r;

  // ①完全一致
  r = hit(e, clean); if (r) return r;

  // ②通常活用（+s/es/ed/ing/er/est/ly/ness/ment/tion/al/ize/ise）
  r = hit(e + "(?:s|es|ed|ing|er|est|ly|ness|ment|tion|al|ize|ise)?", clean);
  if (r && r[1]) return r;

  // ③y→ies/ied（vary→varies, luxury→luxuries）
  if (base.endsWith("y")) {
    r = hit(esc(base.slice(0,-1)) + "(?:ies|ied|ier)", clean);
    if (r) return r;
  }

  // ④e落ち+ing/ed（criticize→criticizing, cope→coping）
  if (base.endsWith("e") && base.length > 3) {
    r = hit(esc(base.slice(0,-1)) + "(?:ing|ed|er)", clean);
    if (r) return r;
  }

  // ⑤子音重複+ing/ed（nod→nodded, spin→spinning, hug→hugged）
  const last = base.slice(-1);
  if (!"aeiou".includes(last)) {
    r = hit(e + last + "(?:ing|ed|er)", clean);
    if (r) return r;
  }

  // ⑥不規則変化辞書
  const bl = base.toLowerCase();
  if (IRREG[bl]) {
    for (const form of IRREG[bl]) {
      r = hit(esc(form), clean);
      if (r) return r;
    }
  }

  // ⑦フォールバック（拡充ストップワード除外・3文字以上）
  const tokens = sentence.match(/\b[\w']+\b/g) || [];
  for (const tok of tokens) {
    const w = tok.toLowerCase().replace(/'s$/, "");
    if (!STOP.has(w) && w.length > 2) {
      const ci = sentence.indexOf(tok);
      return [sentence.slice(0, ci), tok, sentence.slice(ci + tok.length)];
    }
  }

  const sp = sentence.indexOf(" ");
  if (sp > 0) return ["", sentence.slice(0, sp), sentence.slice(sp)];
  return ["", sentence, ""];
}

function makeQ(qobj) {
  const entry   = qobj.entry;
  const word    = entry[3];
  const answer  = cleanAns(qobj.mc_s || qobj.ex_ja_s);
  const base    = word.split(/[\s（(～〜]/)[0].replace(/[,.!?]$/, "");
  const parts   = findUL(base, qobj.ex_en_s);
  return {
    pre:     parts[0],
    und:     parts[1],
    suf:     parts[2],
    answer:  answer,
    word:    word,
    cefr:    entry[4],
    meaning: entry[5],
    group:   entry[1],
    sheet:   entry[0],
    full_ja: qobj.ex_ja_s
  };
}

// ── Shuffle ─────────────────────────────────────────────────────
function shuffleArr(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ── Quiz ────────────────────────────────────────────────────────
function startQuiz(customPool) {
  let pool = customPool || getFilteredPool();
  if (pool.length === 0) {
    alert("該当する問題がありません。フィルターを確認してください。");
    return;
  }

  if (!customPool) {
    const qv = parseInt(document.getElementById("qCount").value);
    if (qv > 0 && qv < pool.length) {
      pool = shuffleArr(pool).slice(0, qv);
      if (mode === "seq") pool.sort(function(a,b){ return a.entry[2] - b.entry[2]; });
    } else if (mode === "shuffle") {
      pool = shuffleArr(pool);
    }
  } else if (mode === "shuffle") {
    pool = shuffleArr(pool);
  }

  queue  = pool;
  qIdx   = 0;
  scores = { o: 0, x: 0, skip: 0 };
  wrongEntries = [];
  showScreen("quiz");
  showQuestion();
}

function showQuestion() {
  if (qIdx >= queue.length) { showResult(); return; }
  const qobj  = queue[qIdx];
  const q     = makeQ(qobj);
  const entry = qobj.entry;

  isFlipped = false;
  answered  = false;
  setBtnsDisabled(true);

  document.getElementById("cardTag").textContent  = entry[0] + " #" + entry[2];
  document.getElementById("cardCefr").textContent = entry[4] || "";

  const s = document.getElementById("cardSentence");
  s.innerHTML = escH(q.pre) + '<span class="ul">' + escH(q.und) + "</span>" + escH(q.suf);

  document.getElementById("cardWord").textContent      = q.word;
  document.getElementById("cardTagB").textContent      = entry[0];
  document.getElementById("cardMeaningJa").textContent = q.answer;
  document.getElementById("cardMeaningRaw").textContent= q.full_ja;

  const tot = queue.length;
  document.getElementById("progPos").textContent       = (qIdx + 1) + " / " + tot;
  document.getElementById("progressBar").style.width   = (qIdx / tot * 100) + "%";
  document.getElementById("scoreO").textContent        = "○ " + scores.o;
  document.getElementById("scoreX").textContent        = "× " + scores.x;
  document.getElementById("headerStats").innerHTML     = "全 <span>" + tot + "</span> 問";
}

function flipCard() {
  if (answered) return;
  isFlipped = !isFlipped;
  document.getElementById("cardScene").classList.toggle("flipped", isFlipped);
  if (isFlipped) {
    setBtnsDisabled(false);
    document.getElementById("flipHint").textContent = "○ 正解 / ✕ 不正解 を選んでください";
  } else {
    setBtnsDisabled(true);
    document.getElementById("flipHint").textContent = "カードをクリックして答えを確認 — その後 ○/× を押してください";
  }
}

function setBtnsDisabled(disabled) {
  ["btnO","btnX","btnSkip"].forEach(function(id) {
    document.getElementById(id).disabled = disabled;
  });
}

function answer(correct) {
  if (answered) return;
  answered = true;
  setBtnsDisabled(true);
  if (correct === true)       scores.o++;
  else if (correct === false) { scores.x++; wrongEntries.push(queue[qIdx]); }
  else                        scores.skip++;
  qIdx++;
  // Flip back to front first, update content only after animation finishes
  isFlipped = false;
  document.getElementById("cardScene").classList.remove("flipped");
  document.getElementById("flipHint").textContent = "カードをクリックして答えを確認 — その後 ○/× を押してください";
  setTimeout(showQuestion, 480);
}

// ── Result ──────────────────────────────────────────────────────
function showResult() {
  showScreen("result");
  const answered_tot = scores.o + scores.x;
  const pct = answered_tot > 0 ? Math.round(scores.o / answered_tot * 100) : 0;
  document.getElementById("resPct").textContent  = pct + "%";
  document.getElementById("resO").textContent    = scores.o;
  document.getElementById("resX").textContent    = scores.x;
  document.getElementById("resSkip").textContent = scores.skip;

  const wl = document.getElementById("wrongList");
  const wi = document.getElementById("wrongItems");
  if (wrongEntries.length > 0) {
    wl.style.display = "block";
    wi.innerHTML = wrongEntries.map(function(qobj) {
      const e  = qobj.entry;
      const ms = e[5].replace(/^\[.+?\]\s*/, "").split("\n")[0].substring(0, 40);
      return '<div class="wrong-item">'
        + '<span class="wi-word">' + escH(e[3]) + "</span> "
        + '<span class="wi-m">— ' + escH(ms) + "</span>"
        + '<div style="font-size:.65rem;color:var(--text-muted);margin-top:2px;">'
        + escH(qobj.ex_en_s) + "</div></div>";
    }).join("");
  } else {
    wl.style.display = "none";
  }
}

function retryWrong() {
  if (wrongEntries.length === 0) { alert("不正解がありません！"); return; }
  startQuiz(wrongEntries);
}

function resetToStart() {
  showScreen("start");
  updateCount();
}

// ── Helpers ─────────────────────────────────────────────────────
function showScreen(name) {
  document.getElementById("startScreen").style.display  = name === "start"  ? "flex" : "none";
  document.getElementById("quizArea").style.display     = name === "quiz"   ? "flex" : "none";
  document.getElementById("resultArea").style.display   = name === "result" ? "flex" : "none";
}

function escH(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

initUI();

</script>
